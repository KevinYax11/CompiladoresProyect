<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Compilador Pseudo-C a Multi-Lenguaje</title>
    <style>
        :root { --navy: #003366; --gold: #D4AF37; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { background: var(--navy); color: white; padding: 10px 25px; border-radius: 10px; border-bottom: 5px solid var(--gold); margin-bottom: 20px; }
        
        .main-layout { display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        .input-panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 400px; font-family: 'Consolas', monospace; border: 1px solid #ccc; border-radius: 5px; padding: 10px; box-sizing: border-box; resize: vertical; }
        
        button { background: var(--gold); color: var(--navy); border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        button:hover { filter: brightness(1.1); }
        
        .output-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .output-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .code-view { background: #1e1e1e; color: #dcdcdc; padding: 15px; border-radius: 5px; height: 200px; overflow: auto; font-family: 'Consolas', monospace; white-space: pre; font-size: 13px; }
        h3 { margin-top: 0; color: var(--navy); font-size: 16px; border-left: 4px solid var(--gold); padding-left: 10px; }
        .full-width { grid-column: span 2; }

        /* Estilos del Toast (Notificación de Error) */
        .toast-error {
            visibility: hidden;
            min-width: 300px;
            background-color: #e74c3c;
            color: white;
            text-align: center;
            border-radius: 8px;
            padding: 16px 20px;
            position: fixed;
            z-index: 1000;
            right: 30px;
            top: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 15px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s, top 0.4s;
            border-left: 6px solid #c0392b;
        }
        .toast-error.show {
            visibility: visible;
            opacity: 1;
            top: 40px; 
        }
    </style>
</head>
<body>

    <div id="errorToast" class="toast-error"></div>

    <div class="header">
        <h2>Diagrama de Flujo a Código Máquina</h2>
    </div>
    
    <div class="main-layout">
        <div class="input-panel">
            <h3>Entrada de Lógica</h3>
            <textarea id="sourceCode" placeholder="Escribe tu lógica en Pseudo-C aquí...&#10;float main() {&#10;    float x = 10.0;&#10;    print(x);&#10;    return x;&#10;}"></textarea>
            <button onclick="procesar()">COMPILAR Y TRADUCIR</button>
        </div>
        
        <div class="output-grid">
            <div class="output-box">
                <h3>Tokens</h3>
                <div id="outTokens" class="code-view"></div>
            </div>
            <div class="output-box">
                <h3>AST (JSON)</h3>
                <div id="outAST" class="code-view"></div>
            </div>
            <div class="output-box">
                <h3>Python</h3>
                <div id="outPy" class="code-view"></div>
            </div>
            <div class="output-box">
                <h3>Ruby</h3>
                <div id="outRuby" class="code-view"></div>
            </div>
            <div class="output-box full-width">
                <h3>C++</h3>
                <div id="outCpp" class="code-view" style="height: 120px;"></div>
            </div>
            <div class="output-box full-width">
                <h3>Ensamblador (ASM x86-64)</h3>
                <div id="outAsm" class="code-view" style="height: 250px;"></div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
